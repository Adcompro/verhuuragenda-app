workflows:
  # iOS Simulator workflow voor previews
  ios-simulator-workflow:
    name: iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Create Flutter project structure
        script: |
          cp -r lib lib_backup
          cp pubspec.yaml pubspec_backup.yaml
          flutter create --org nl.verhuurvakantiewoning --project-name verhuurvakantiewoning_app .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate localizations
        script: |
          flutter gen-l10n

      - name: Enable iPad support
        script: |
          cd ios
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" Runner/Info.plist
          echo "UIDeviceFamily set to:"
          /usr/libexec/PlistBuddy -c "Print :UIDeviceFamily" Runner/Info.plist

      - name: Build iOS Simulator App
        script: |
          flutter build ios --debug --simulator

    artifacts:
      - build/ios/iphonesimulator/*.app

  # iPad Preview workflow met Flutter integration tests voor screenshots
  ios-ipad-preview:
    name: iPad Screenshot Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - screenshot_demo

    scripts:
      - name: Create Flutter project structure
        script: |
          cp -r lib lib_backup
          cp pubspec.yaml pubspec_backup.yaml
          cp -r integration_test integration_test_backup 2>/dev/null || true
          flutter create --org nl.verhuurvakantiewoning --project-name verhuurvakantiewoning_app .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml
          rm -rf integration_test 2>/dev/null || true
          mv integration_test_backup integration_test 2>/dev/null || true

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate localizations
        script: |
          flutter gen-l10n

      - name: Enable iPad support
        script: |
          cd ios
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" Runner/Info.plist

      - name: Boot iPad Pro Simulator
        script: |
          # Find iPad Pro 12.9 inch for best screenshots
          IPAD_UDID=$(xcrun simctl list devices available | grep -i "iPad Pro (12.9-inch)" | head -1 | grep -oE '[A-F0-9-]{36}')
          if [ -z "$IPAD_UDID" ]; then
            IPAD_UDID=$(xcrun simctl list devices available | grep -i "iPad Pro" | head -1 | grep -oE '[A-F0-9-]{36}')
          fi
          if [ -z "$IPAD_UDID" ]; then
            IPAD_UDID=$(xcrun simctl list devices available | grep -i "iPad" | head -1 | grep -oE '[A-F0-9-]{36}')
          fi
          echo "Booting iPad with UDID: $IPAD_UDID"
          xcrun simctl boot "$IPAD_UDID" || true
          echo "$IPAD_UDID" > /tmp/ipad_udid.txt
          sleep 15

      - name: Run Flutter Drive test for screenshots
        script: |
          set -x  # echo each command for debug
          IPAD_UDID=$(cat /tmp/ipad_udid.txt)
          PROJECT_DIR=$(pwd)
          SHOTS_DIR="$PROJECT_DIR/screenshots"
          echo "Using iPad UDID: $IPAD_UDID"
          echo "Project dir:   $PROJECT_DIR"
          echo "Shots dir:     $SHOTS_DIR"

          mkdir -p "$SHOTS_DIR"

          # Run flutter drive with integration test. Credentials are
          # passed via --dart-define and originate from the
          # 'screenshot_demo' Codemagic environment variable group.
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshot_test.dart \
            --dart-define=SCREENSHOT_LOGIN_EMAIL="${SCREENSHOT_LOGIN_EMAIL:-review@apple.com}" \
            --dart-define=SCREENSHOT_LOGIN_PASSWORD="${SCREENSHOT_LOGIN_PASSWORD:-Review123!}" \
            -d "$IPAD_UDID" \
            --verbose \
            2>&1 | tail -200 || echo "Flutter drive completed (may have warnings)"

          echo "===== files anywhere named *.png ====="
          find "$PROJECT_DIR" -name "*.png" -type f 2>/dev/null | grep -v -E "\\.(dart_tool|build|symlinks|Pods)/" | head -30

          # Move any stray PNGs at project root into shots dir
          mv "$PROJECT_DIR"/*.png "$SHOTS_DIR/" 2>/dev/null || true

          # ===== Fallback: if integration test produced nothing =====
          if [ -z "$(ls -A "$SHOTS_DIR" 2>/dev/null)" ]; then
            echo "No screenshots from integration test, using fallback…"

            flutter build ios --debug --simulator

            xcrun simctl install "$IPAD_UDID" "$PROJECT_DIR/build/ios/iphonesimulator/Runner.app"
            BUNDLE_ID=$(defaults read "$PROJECT_DIR/build/ios/iphonesimulator/Runner.app/Info.plist" CFBundleIdentifier)
            echo "Launching app: $BUNDLE_ID"
            xcrun simctl launch "$IPAD_UDID" "$BUNDLE_ID"
            sleep 20

            # Use absolute path so simctl io's "folder doesn't exist"
            # error can't bite us.
            echo "Taking fallback screenshot to $SHOTS_DIR/01_dashboard.png …"
            xcrun simctl io "$IPAD_UDID" screenshot "$SHOTS_DIR/01_dashboard.png"
          fi

          echo "===== SCREENSHOTS ====="
          ls -la screenshots/ 2>/dev/null || echo "No screenshots directory"

    artifacts:
      - build/ios/iphonesimulator/*.app
      - screenshots/*.png
      - "*.png"

  # iOS App Store workflow
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: codemagic-new

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      ios_signing:
        provisioning_profiles:
          - casamio_apstore
        certificates:
          - vakantiewoningverhuur_nieuw

    scripts:
      - name: Create Flutter project structure
        script: |
          cp -r lib lib_backup
          cp pubspec.yaml pubspec_backup.yaml
          cp -r assets assets_backup 2>/dev/null || true
          flutter create --org nl.verhuurvakantiewoning --project-name verhuurvakantiewoning_app .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml
          rm -rf assets 2>/dev/null || true
          mv assets_backup assets 2>/dev/null || true

      - name: Update iOS bundle identifier, version and permissions
        script: |
          cd ios
          FULL_VERSION=$(grep '^version:' ../pubspec.yaml | awk '{print $2}')
          VERSION=$(echo $FULL_VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $FULL_VERSION | cut -d'+' -f2)
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier nl.verhuurvakantiewoning.app" Runner/Info.plist
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = nl.verhuurvakantiewoning.app;/g' Runner.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Runner/Info.plist
          # User-visible app name on the home screen + system menus
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName CasaMio" Runner/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string CasaMio" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName CasaMio" Runner/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleName string CasaMio" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string CasaMio heeft toegang nodig tot je camera om fotos te maken." Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string CasaMio wil fotos uit je bibliotheek gebruiken." Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string CasaMio wil fotos opslaan in je bibliotheek." Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" Runner/Info.plist || true

      - name: Add Push entitlements
        script: |
          # `flutter create` generates an iOS project without
          # Runner.entitlements. Without aps-environment iOS never
          # registers the device for APNs, so getAPNSToken() returns
          # nil and FirebaseMessaging.getToken() throws
          # apns-token-not-set. We create the file and wire it into
          # the Xcode project so the IPA carries the entitlement.
          cat > ios/Runner/Runner.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
          </dict>
          </plist>
          PLIST
          # Reference the entitlements file in project.pbxproj using
          # Python (preinstalled on macOS, no extra gems required).
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('ios/Runner.xcodeproj/project.pbxproj')
          src = p.read_text()
          if 'CODE_SIGN_ENTITLEMENTS' in src:
              print('✓ CODE_SIGN_ENTITLEMENTS already present')
          else:
              new = re.sub(
                  r'(PRODUCT_BUNDLE_IDENTIFIER = nl\.verhuurvakantiewoning\.app;)',
                  r'\1\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;',
                  src,
              )
              p.write_text(new)
              hits = new.count('CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;')
              print(f'✓ CODE_SIGN_ENTITLEMENTS added to {hits} build config(s)')
          PY

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate localizations
        script: |
          flutter gen-l10n

      - name: Generate app icons
        script: |
          dart run flutter_launcher_icons

      - name: Generate export_options.plist
        script: |
          # Manual signing via ios_signing installs the cert and
          # profile, but does not generate export_options.plist.
          # xcode-project use-profiles reads the installed profiles
          # (casamio_apstore) and writes ~/export_options.plist that
          # the next "flutter build ipa" step needs.
          xcode-project use-profiles

      - name: Build iOS App
        script: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo $FULL_VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $FULL_VERSION | cut -d'+' -f2)
          flutter build ipa --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Upload only — internal testers can install immediately without
        # external beta review. Avoids the "Another build in same train
        # is already in beta review" 422 that blocks the whole pipeline.
        submit_to_testflight: false

  # Android workflow (Debug/Test only)
  android-debug-workflow:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Create Flutter project structure
        script: |
          cp -r lib lib_backup
          cp pubspec.yaml pubspec_backup.yaml
          cp -r assets assets_backup 2>/dev/null || true
          flutter create --org nl.verhuurvakantiewoning --project-name verhuurvakantiewoning_app .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml
          rm -rf assets 2>/dev/null || true
          mv assets_backup assets 2>/dev/null || true

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate localizations
        script: |
          flutter gen-l10n

      - name: Build Debug APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/**/outputs/**/*.apk

  # Android Play Store workflow
  android-workflow:
    name: Android Play Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      java: 17
      groups:
        - android_signing
        - google_play_credentials
      vars:
        PACKAGE_NAME: "nl.verhuurvakantiewoning.app"

    scripts:
      - name: Create Flutter project structure
        script: |
          cp -r lib lib_backup
          cp pubspec.yaml pubspec_backup.yaml
          cp -r assets assets_backup 2>/dev/null || true
          flutter create --org nl.verhuurvakantiewoning --project-name verhuurvakantiewoning_app .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml
          rm -rf assets 2>/dev/null || true
          mv assets_backup assets 2>/dev/null || true

      - name: Update Android package name
        script: |
          cd android
          # Update build.gradle
          sed -i.bak "s/applicationId.*/applicationId \"$PACKAGE_NAME\"/" app/build.gradle
          # Update namespace if present
          sed -i.bak "s/namespace.*/namespace \"$PACKAGE_NAME\"/" app/build.gradle || true

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate localizations
        script: |
          flutter gen-l10n

      - name: Generate app icons
        script: |
          dart run flutter_launcher_icons

      - name: Set up Android signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_KEYSTORE_PATH
          cat > android/key.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Configure signing in build.gradle
        script: |
          cd android/app
          echo "Contents of android/app:"
          ls -la

          if [ -f "build.gradle.kts" ]; then
            echo "Found Kotlin build.gradle.kts - configuring signing"

            echo 'import java.util.Properties' > /tmp/signing_header.txt
            echo 'import java.io.FileInputStream' >> /tmp/signing_header.txt
            echo '' >> /tmp/signing_header.txt
            echo 'val keystorePropertiesFile = rootProject.file("key.properties")' >> /tmp/signing_header.txt
            echo 'val keystoreProperties = Properties()' >> /tmp/signing_header.txt
            echo 'if (keystorePropertiesFile.exists()) { keystoreProperties.load(FileInputStream(keystorePropertiesFile)) }' >> /tmp/signing_header.txt
            echo '' >> /tmp/signing_header.txt

            cat /tmp/signing_header.txt build.gradle.kts > /tmp/build_temp.kts
            mv /tmp/build_temp.kts build.gradle.kts

          elif [ -f "build.gradle" ]; then
            echo "Found Groovy build.gradle - configuring signing"

            echo 'def keystoreProperties = new Properties()' > /tmp/signing_header.txt
            echo 'def keystorePropertiesFile = rootProject.file("key.properties")' >> /tmp/signing_header.txt
            echo 'if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }' >> /tmp/signing_header.txt
            echo '' >> /tmp/signing_header.txt

            cat /tmp/signing_header.txt build.gradle > /tmp/build_temp.gradle
            mv /tmp/build_temp.gradle build.gradle
          else
            echo "No build.gradle found - listing directory"
            ls -la
          fi

          echo "Signing header configured"

      - name: Build AAB for Play Store
        script: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo $FULL_VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $FULL_VERSION | cut -d'+' -f2)
          flutter build appbundle --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt

    # Publishing uitgeschakeld - upload handmatig naar Google Play Console
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: true
